<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLATE</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body style="padding:0;margin:0;width:100vw;height:100vh;overflow:hidden;">

  <!-- Video + Canvas overlay (full screen) -->
  <div id="video-container" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    overflow: hidden;
  ">
    <video id="video" autoplay playsinline style="
      display: block;
      object-fit: cover;
      width: 100%;
      height: 100%;
    "></video>
    <canvas id="canvas" style="
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    "></canvas>
  </div>

  <!-- Plate display overlay (top right) -->
  <div id="plate-overlay" style="
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 25;
    pointer-events: none;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.25rem;
  ">
    <!-- Current detected plate (big) -->
    <div id="current-plate" style="
      font-size: 3rem;
      font-weight: 900;
      color: #ff6b35;
      -webkit-text-stroke: 2px #000;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8), -1px -1px 2px rgba(0,0,0,0.6);
      display: none;
      white-space: nowrap;
    "></div>
    <!-- Top 5 recent plates -->
    <div id="top5-plates" style="
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.1rem;
    "></div>
  </div>

  <!-- All plates list (under top 5, right side, 25% width) -->
  <div id="all-plates-container" style="
    position: fixed;
    top: 0;
    right: 0;
    width: 25%;
    height: 100%;
    z-index: 24;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    font-family: monospace;
  ">
    <!-- Spacer that grows to push list below the plate overlay -->
    <div id="all-plates-spacer" style="flex-shrink: 0; min-height: 280px;"></div>
    <div style="
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.5rem;
      padding: 0.25rem 1rem;
      pointer-events: auto;
    ">
      <label style="
        color: #fff;
        font-size: 0.7rem;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
        display: flex;
        align-items: center;
        gap: 0.25rem;
        cursor: pointer;
      ">
        <input type="checkbox" id="autoscroll-toggle" checked>
        Auto-scroll
      </label>
    </div>
    <div id="all-plates-list" style="
      flex: 1;
      overflow-y: auto;
      pointer-events: auto;
      padding: 0 1rem 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    "></div>
  </div>

  <!-- Controls overlay (fixed at bottom) -->
  <div id="control-buttons" style="
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    z-index: 20;
    background: rgba(0, 0, 0, 0.7);
    padding: 1rem;
    max-height: 30vh;
    overflow-y: auto;
  ">
    <div style="display: flex; flex-direction: row; gap: 0.5rem; flex-wrap: wrap; justify-content: center;">
      <button id="start-btn" class="btn">Start Camera</button>
      <button id="stream-btn" class="btn" disabled>Start Detection</button>
      <button id="stop-stream-btn" class="btn" disabled>Stop Detection</button>
      <button id="export-btn" class="btn">Export Plates</button>
      <button id="import-btn" class="btn">Import Plates</button>
      <input type="file" id="import-file" accept=".json" style="display:none;">
      <button id="reset-btn" class="btn btn-sm" style="font-size:0.7rem;">Reset Count</button>
    </div>
    <div id="status" style="color: #888; margin-top: 0.5rem; text-align: center; font-size: 0.875rem;"></div>
    <div id="zoom-status" style="display: none; color: #ff6b35; font-size: 0.8rem; text-align: center;"></div>
    <div style="color: #ccc; font-size: 0.85rem; display: flex; align-items: center; justify-content: center;">
      <input type="checkbox" id="centered-toggle" style="cursor: pointer;">
      <label for="centered-toggle" style="cursor: pointer; margin-left: 0.35rem;">Center on zoom</label>
    </div>
  </div>

  <script type="module" src="static/plat-cr.js"></script>
</body>
</html>
