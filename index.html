<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLATE</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body style="padding:0;margin:0;width:100vw;height:100vh;overflow:hidden;">

  <!-- Video + Canvas overlay (full screen) -->
  <div id="video-container" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    overflow: hidden;
  ">
    <video id="video" autoplay playsinline style="
      display: block;
      object-fit: cover;
      width: 100%;
      height: 100%;
    "></video>
    <canvas id="canvas" style="
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    "></canvas>
  </div>

  <!-- Controls overlay (fixed at bottom) -->
  <div id="control-buttons" style="
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    z-index: 20;
    background: rgba(0, 0, 0, 0.7);
    padding: 1rem;
    max-height: 30vh;
    overflow-y: auto;
  ">
    <div style="display: flex; flex-direction: row; gap: 0.5rem; flex-wrap: wrap; justify-content: center;">
      <button id="start-btn" class="btn">Start Camera</button>
      <button id="stream-btn" class="btn" disabled>Start Detection</button>
      <button id="stop-stream-btn" class="btn" disabled>Stop Detection</button>
    </div>
    <div id="status" style="color: #888; margin-top: 0.5rem; text-align: center; font-size: 0.875rem;"></div>
    <div id="zoom-status" style="display: none; color: #ff6b35; font-size: 0.8rem; text-align: center;"></div>
    <div style="color: #ccc; font-size: 0.85rem; display: flex; align-items: center; justify-content: center;">
      <input type="checkbox" id="centered-toggle" style="cursor: pointer;">
      <label for="centered-toggle" style="cursor: pointer; margin-left: 0.35rem;">Center on zoom</label>
    </div>
  </div>

  <!-- Detection log -->
  <div id="data-list" style="
    position: fixed;
    bottom: 0;
    left: 75%;
    right: 0;
    max-height: 10vh;
    overflow-y: auto;
    background: rgba(255,255,255,0.7);
    z-index: 15;
    display: none;
  " class="flex border border-base-300">
    <ul id="list"></ul>
  </div>

  <script type="module" src="static/plat-cr.js"></script>
</body>
</html>
